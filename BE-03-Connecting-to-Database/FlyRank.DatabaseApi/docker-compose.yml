version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: flyrank_postgres_db
    environment:
      POSTGRES_USER: flyrank_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: flyrank_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyrank_user -d flyrank_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
